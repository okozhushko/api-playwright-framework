name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run format:check
      - run: npm run lint
      - run: npx tsc --noEmit
      # This gate runs against the live JSONPlaceholder API by design (see CLAUDE.md CI/CD
      # section) — the suite's purpose is verifying real integration behavior against that
      # specific service, not client code in isolation. A transient outage here can block an
      # unrelated PR; that's an accepted trade-off, not an oversight.
      - run: npm run test:coverage
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
